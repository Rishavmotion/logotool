<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Taste Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #080808;
  --surface: #111;
  --surface2: #161616;
  --border: #222;
  --text: #F5F5F5;
  --muted: #555;
  --love: #22C55E;
  --hate: #EF4444;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 480px;
  padding: 24px 20px;
  height: 100vh;
  justify-content: center;
}
.screen.active { display: flex; }

/* ── INDUSTRY SCREEN ── */
.main-title { font-size: 1.55rem; font-weight: 600; margin-bottom: 6px; text-align: center; }
.main-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 36px; text-align: center; }
.industry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
.industry-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 18px 16px; border-radius: 14px;
  font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 500;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
  text-align: left; display: flex; flex-direction: column; gap: 10px;
}
.industry-btn:hover { background: var(--surface2); border-color: #333; }
.ind-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 0.95rem;
}
.ind-meta { display: flex; flex-direction: column; gap: 2px; }
.ind-label { font-size: 0.88rem; font-weight: 500; }
.ind-count { color: var(--muted); font-size: 0.75rem; font-weight: 400; }

/* ── SWIPE SCREEN ── */
.top-bar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; padding: 18px 22px;
  display: flex; align-items: center; gap: 12px; z-index: 100;
  background: linear-gradient(to bottom, var(--bg) 60%, transparent);
}
.back-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.85rem; flex-shrink: 0;
}
.back-btn:hover { color: var(--text); border-color: #444; }
.progress-bar { flex:1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
.progress-label { color: var(--muted); font-size: 0.75rem; white-space: nowrap; flex-shrink: 0; }

.card-area {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex:1; width: 100%;
}
.card-stack { position: relative; width: 310px; height: 370px; }
.card-bg {
  position: absolute; width: 100%; height: 100%;
  border-radius: 22px; background: var(--surface); border: 1px solid var(--border);
}
.card-bg:nth-child(1) { transform: scale(0.92) translateY(16px); opacity: 0.45; }
.card-bg:nth-child(2) { transform: scale(0.96) translateY(8px); opacity: 0.7; }

.logo-card {
  position: absolute; top:0; left:0; width:100%; height:100%;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 22px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: grab; user-select: none; touch-action: none; will-change: transform;
}
.logo-card:active { cursor: grabbing; }

/* White logo stage */
.logo-stage {
  width: 200px; height: 140px;
  background: #fff; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.logo-stage img {
  max-width: 140px; max-height: 90px;
  object-fit: contain; display: block;
}
/* Fallback initial badge */
.logo-fallback {
  width: 64px; height: 64px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; font-weight: 700; color: #fff;
  font-family: 'Inter', sans-serif;
}
.card-name { margin-top: 18px; font-size: 0.82rem; color: var(--muted); font-weight: 400; }
.card-industry-badge {
  margin-top: 6px; font-size: 0.7rem; color: #333;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 20px;
}

/* Swipe labels */
.card-label-love, .card-label-hate {
  position: absolute; padding: 5px 12px; border-radius: 7px;
  font-weight: 700; font-size: 0.9rem; letter-spacing: 0.06em;
  opacity: 0; pointer-events: none; top: 22px;
}
.card-label-love { right: 18px; color: var(--love); border: 2px solid var(--love); }
.card-label-hate { left: 18px; color: var(--hate); border: 2px solid var(--hate); }

.swipe-hints { display: flex; gap: 48px; margin-top: 24px; color: var(--muted); font-size: 0.76rem; }

/* ── RESULTS SCREEN ── */
#screen-results { overflow-y: auto; padding-top: 60px; justify-content: flex-start; }
.result-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; text-align: center; }
.result-sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 18px; text-align: center; }
.taste-badge {
  display: inline-block; background: var(--surface); border: 1px solid var(--border);
  border-radius: 30px; padding: 7px 16px; font-size: 0.88rem; font-weight: 500; margin-bottom: 22px;
}
.stats-row { display: flex; gap: 8px; width: 100%; margin-bottom: 22px; }
.stat-box {
  flex:1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 10px; text-align: center;
}
.stat-val { font-size: 1.35rem; font-weight: 600; }
.stat-lbl { color: var(--muted); font-size: 0.7rem; margin-top: 2px; }

.result-section { width: 100%; margin-bottom: 18px; }
.result-section-title {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.09em; margin-bottom: 10px; text-align: left;
}
.section-love .result-section-title { color: var(--love); }
.section-hate .result-section-title { color: var(--hate); }

.result-logo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.result-logo-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.result-logo-card.loved { border-color: rgba(34,197,94,0.25); }
.result-logo-card.hated { border-color: rgba(239,68,68,0.25); }
.result-logo-mini {
  width: 72px; height: 44px; background: #fff; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.result-logo-mini img { max-width: 54px; max-height: 34px; object-fit: contain; }
.result-logo-mini .mini-fallback {
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 700; color: #fff;
}
.result-logo-name { font-size: 0.68rem; color: var(--muted); text-align: center; }

.action-row { display: flex; gap: 8px; width: 100%; margin-top: 8px; padding-bottom: 40px; }
.btn {
  flex:1; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 12px; border-radius: 11px;
  font-family: 'Inter', sans-serif; font-size: 0.86rem; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
}
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--text); color: #000; border-color: var(--text); }
.btn.primary:hover { background: #ddd; }
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #000; padding: 9px 18px;
  border-radius: 30px; font-size: 0.82rem; font-weight: 500;
  opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SCREEN: Industry -->
<div id="screen-industry" class="screen active">
  <div class="main-title">Logo Taste Test</div>
  <div class="main-sub">Pick an industry to begin the session</div>
  <div class="industry-grid" id="industry-grid"></div>
</div>

<!-- SCREEN: Swipe -->
<div id="screen-swipe" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-label" id="progress-label">0 / 10</span>
  </div>
  <div class="card-area">
    <div class="card-stack" id="card-stack">
      <div class="card-bg"></div>
      <div class="card-bg"></div>
    </div>
    <div class="swipe-hints">
      <span>← Hate</span>
      <span>Love →</span>
    </div>
  </div>
</div>

<!-- SCREEN: Results -->
<div id="screen-results" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="restart()">←</button>
  </div>
  <div style="width:100%;text-align:center;">
    <div class="result-title">Taste Profile</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="taste-badge" id="taste-badge">—</div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="stat-time">—</div><div class="stat-lbl">avg. decision</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-loved">—</div><div class="stat-lbl">loved</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-hated">—</div><div class="stat-lbl">hated</div></div>
  </div>
  <div class="result-section section-love">
    <div class="result-section-title">Most Loved</div>
    <div class="result-logo-grid" id="loved-grid"></div>
  </div>
  <div class="result-section section-hate">
    <div class="result-section-title">Most Hated</div>
    <div class="result-logo-grid" id="hated-grid"></div>
  </div>
  <div class="action-row">
    <button class="btn" onclick="copyResults()">Copy Summary</button>
    <button class="btn primary" onclick="restart()">New Session</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const INDUSTRIES = {
  tech:    { label:"Technology",       icon:"◈",  color:"#635BFF" },
  finance: { label:"Finance",          icon:"◇",  color:"#0052FF" },
  health:  { label:"Healthcare",       icon:"◎",  color:"#00A96E" },
  retail:  { label:"Retail",           icon:"⬡",  color:"#FF9900" },
  energy:  { label:"Energy",           icon:"△",  color:"#F59E0B" },
  auto:    { label:"Auto & Transport", icon:"○",  color:"#6366F1" },
  food:    { label:"Food & Beverage",  icon:"⬟",  color:"#EF4444" },
};

const LOGOS_PER_SESSION = 10;

// ============================================================
// STATE
// ============================================================
let state = { industry:null, queue:[], index:0, loved:[], hated:[], times:[], cardStart:0 };
let drag  = { active:false, startX:0, currentX:0, card:null };

// ============================================================
// INIT
// ============================================================
function init() {
  const grid = document.getElementById('industry-grid');
  Object.entries(INDUSTRIES).forEach(([key, ind]) => {
    const count = LOGOS.filter(l => l.industry === key).length;
    const btn = document.createElement('button');
    btn.className = 'industry-btn';
    btn.innerHTML = `
      <div class="ind-icon" style="background:${ind.color}18;color:${ind.color}">${ind.icon}</div>
      <div class="ind-meta">
        <div class="ind-label">${ind.label}</div>
        <div class="ind-count">${count} companies</div>
      </div>`;
    btn.onclick = () => selectIndustry(key);
    grid.appendChild(btn);
  });
}

function selectIndustry(key) {
  const all = shuffle(LOGOS.filter(l => l.industry === key));
  state = {
    industry: key,
    queue: all.slice(0, LOGOS_PER_SESSION),
    index: 0, loved: [], hated: [], times: [], cardStart: 0
  };
  showScreen('screen-swipe');
  updateProgress();
  renderCard();
}

// ============================================================
// CARD
// ============================================================
function renderCard() {
  const stack = document.getElementById('card-stack');
  const old = stack.querySelector('.logo-card');
  if (old) old.remove();

  if (state.index >= state.queue.length) { showResults(); return; }

  const logo = state.queue[state.index];
  const card = document.createElement('div');
  card.className = 'logo-card';

  const initial = logo.name.charAt(0).toUpperCase();
  card.innerHTML = `
    <div class="logo-stage">
      <img
        src="https://logo.clearbit.com/${logo.domain}?size=300"
        alt="${logo.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      />
      <div class="logo-fallback" style="display:none;background:${logo.color}">${initial}</div>
    </div>
    <div class="card-name">${logo.name}</div>
    <div class="card-label-love">LOVE</div>
    <div class="card-label-hate">HATE</div>`;

  stack.appendChild(card);
  state.cardStart = Date.now();
  bindDrag(card);
}

// ============================================================
// DRAG
// ============================================================
function bindDrag(card) {
  card.addEventListener('mousedown', dragStart);
  card.addEventListener('touchstart', dragStart, { passive:true });
}
function dragStart(e) {
  drag.active = true;
  drag.startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  drag.card = e.currentTarget;
  drag.currentX = 0;
  drag.card.style.transition = 'none';
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchmove', dragMove, { passive:true });
  document.addEventListener('touchend', dragEnd);
}
function dragMove(e) {
  if (!drag.active) return;
  const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
  drag.currentX = x - drag.startX;
  drag.card.style.transform = `translateX(${drag.currentX}px) rotate(${drag.currentX * 0.07}deg)`;
  const love = drag.card.querySelector('.card-label-love');
  const hate = drag.card.querySelector('.card-label-hate');
  if (drag.currentX > 0) {
    love.style.opacity = Math.min((drag.currentX - 30) / 60, 1);
    hate.style.opacity = 0;
  } else {
    hate.style.opacity = Math.min((-drag.currentX - 30) / 60, 1);
    love.style.opacity = 0;
  }
}
function dragEnd() {
  if (!drag.active) return;
  drag.active = false;
  document.removeEventListener('mousemove', dragMove);
  document.removeEventListener('mouseup', dragEnd);
  document.removeEventListener('touchmove', dragMove);
  document.removeEventListener('touchend', dragEnd);
  if      (drag.currentX >  100) flyCard('love');
  else if (drag.currentX < -100) flyCard('hate');
  else {
    drag.card.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
    drag.card.style.transform = '';
    drag.card.querySelectorAll('.card-label-love,.card-label-hate').forEach(el => el.style.opacity = 0);
  }
}

function flyCard(direction) {
  state.times.push((Date.now() - state.cardStart) / 1000);
  if (direction === 'love') state.loved.push(state.queue[state.index]);
  else                      state.hated.push(state.queue[state.index]);
  const x = direction === 'love' ? 700 : -700;
  drag.card.style.transition = 'transform 0.36s cubic-bezier(0.4,0,0.2,1)';
  drag.card.style.transform  = `translateX(${x}px) rotate(${direction === 'love' ? 20 : -20}deg)`;
  setTimeout(() => { state.index++; updateProgress(); renderCard(); }, 320);
}

document.addEventListener('keydown', e => {
  if (document.querySelector('.screen.active')?.id !== 'screen-swipe') return;
  if (e.key === 'ArrowRight' && drag.card) flyCard('love');
  if (e.key === 'ArrowLeft'  && drag.card) flyCard('hate');
});

// ============================================================
// PROGRESS
// ============================================================
function updateProgress() {
  const total = state.queue.length;
  document.getElementById('progress-fill').style.width = (total ? (state.index / total) * 100 : 0) + '%';
  document.getElementById('progress-label').textContent = `${state.index} / ${total}`;
}

// ============================================================
// RESULTS
// ============================================================
function showResults() {
  showScreen('screen-results');
  const avg = state.times.length
    ? (state.times.reduce((a,b) => a+b,0) / state.times.length).toFixed(1) + 's'
    : '—';
  document.getElementById('stat-time').textContent    = avg;
  document.getElementById('stat-loved').textContent   = state.loved.length;
  document.getElementById('stat-hated').textContent   = state.hated.length;
  const profile = computeProfile(state.loved);
  document.getElementById('taste-badge').textContent  = profile;
  document.getElementById('result-sub').textContent   =
    `${state.loved.length} loved · ${state.hated.length} hated · avg ${avg} per logo`;
  renderLogoGrid('loved-grid', state.loved.slice(0,3), 'loved');
  renderLogoGrid('hated-grid', state.hated.slice(0,3), 'hated');
}

function renderLogoGrid(id, logos, type) {
  const grid = document.getElementById(id);
  grid.innerHTML = '';
  if (!logos.length) {
    grid.innerHTML = `<span style="color:var(--muted);font-size:0.78rem;padding:8px 0">None selected</span>`;
    return;
  }
  logos.forEach(logo => {
    const initial = logo.name.charAt(0).toUpperCase();
    const card = document.createElement('div');
    card.className = `result-logo-card ${type}`;
    card.innerHTML = `
      <div class="result-logo-mini">
        <img src="https://logo.clearbit.com/${logo.domain}?size=150" alt="${logo.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="mini-fallback" style="display:none;background:${logo.color}">${initial}</div>
      </div>
      <span class="result-logo-name">${logo.name}</span>`;
    grid.appendChild(card);
  });
}

function computeProfile(loved) {
  if (!loved.length) return 'No clear preference';
  const tally = {};
  loved.forEach(l => (l.tags||[]).forEach(t => tally[t] = (tally[t]||0)+1));
  let best = null, bestScore = -1;
  PROFILE_RULES.forEach(rule => {
    const score = rule.match.reduce((s,t) => s+(tally[t]||0), 0);
    if (score > bestScore) { bestScore = score; best = rule; }
  });
  return best ? best.label : 'Eclectic Taste';
}

function copyResults() {
  const ind     = INDUSTRIES[state.industry]?.label || state.industry;
  const profile = document.getElementById('taste-badge').textContent;
  const avg     = document.getElementById('stat-time').textContent;
  const loved   = state.loved.slice(0,3).map(l=>l.name).join(', ') || 'None';
  const hated   = state.hated.slice(0,3).map(l=>l.name).join(', ') || 'None';
  navigator.clipboard.writeText(
    `Logo Taste Test\nIndustry: ${ind}\nTaste Profile: ${profile}\nAvg Decision: ${avg}\nMost Loved: ${loved}\nMost Hated: ${hated}`
  ).then(() => showToast('Copied to clipboard'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goBack()  { showScreen('screen-industry'); }
function restart() {
  state = { industry:null, queue:[], index:0, loved:[], hated:[], times:[], cardStart:0 };
  showScreen('screen-industry');
}

init();
</script>
</body>
</html>
